spring:
  application:
    name: incident-assistant
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/incidentassistant}
    username: ${DATABASE_USER:incident}
    password: ${DATABASE_PASSWORD:incident}
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState, db
